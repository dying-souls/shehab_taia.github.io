<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEEM — Exam Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0c;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #272727;
    --border2: #333;
    --text: #e4e0d8;
    --muted: #5a5a5a;
    --muted2: #7a7a7a;

    --de: #a78bfa;
    --de-bg: rgba(167,139,250,0.08);
    --de-border: rgba(167,139,250,0.2);

    --em: #34d399;
    --em-bg: rgba(52,211,153,0.07);
    --em-border: rgba(52,211,153,0.2);

    --paper: #fbbf24;
    --paper-bg: rgba(251,191,36,0.07);
    --paper-border: rgba(251,191,36,0.2);

    --both: #94a3b8;
    --both-bg: rgba(148,163,184,0.07);
    --both-border: rgba(148,163,184,0.2);

    --exam: #f87171;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    padding: 2.5rem 1rem 5rem;
    line-height: 1.5;
  }

  .container { max-width: 700px; margin: 0 auto; }

  /* Header */
  header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }

  .module-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1rem, 3vw, 1.25rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.3;
    color: var(--text);
  }

  h1 em {
    color: var(--muted2);
    font-style: normal;
    font-weight: 400;
  }

  .countdown-block { text-align: right; }
  .countdown-num {
    font-family: 'Space Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: var(--exam);
    line-height: 1;
  }
  .countdown-label {
    font-size: 0.7rem;
    color: var(--muted2);
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  /* Progress */
  .prog-wrap { margin-bottom: 1.5rem; }
  .prog-top {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted2);
    margin-bottom: 7px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .prog-bar {
    height: 3px;
    background: var(--border2);
    border-radius: 2px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--de), var(--em));
    border-radius: 2px;
    transition: width 0.35s ease;
    width: 0%;
  }

  /* Filters */
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 2rem;
  }
  .filter-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--muted); color: var(--text); }
  .filter-btn.active.f-de  { background: var(--de-bg);    border-color: var(--de-border);    color: var(--de); }
  .filter-btn.active.f-em  { background: var(--em-bg);    border-color: var(--em-border);    color: var(--em); }
  .filter-btn.active.f-paper { background: var(--paper-bg); border-color: var(--paper-border); color: var(--paper); }
  .filter-btn.active.f-todo { background: var(--both-bg);  border-color: var(--both-border);  color: var(--text); }
  .filter-btn.active.f-all  { border-color: var(--muted); color: var(--text); }

  /* Sections */
  .section { margin-bottom: 2.5rem; }

  .section-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 0.5px solid var(--border);
  }

  .section-name {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .s-de   .section-name { color: var(--de); }
  .s-em   .section-name { color: var(--em); }
  .s-paper .section-name { color: var(--paper); }
  .s-both .section-name { color: var(--muted2); }

  .section-tally {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-left: auto;
  }

  /* Tasks */
  .tasks { display: flex; flex-direction: column; gap: 4px; }

  .task {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 9px 13px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.12s ease;
    user-select: none;
  }
  .task:hover { filter: brightness(1.2); }

  .s-de   .task { background: var(--de-bg);    border-color: var(--de-border); }
  .s-em   .task { background: var(--em-bg);    border-color: var(--em-border); }
  .s-paper .task { background: var(--paper-bg); border-color: var(--paper-border); }
  .s-both .task { background: var(--both-bg);  border-color: var(--both-border); }

  .task.done { opacity: 0.38; }
  .task.done .task-label { text-decoration: line-through; }

  .cb {
    width: 16px; height: 16px;
    border-radius: 3px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
  }

  .s-de    .task.done .cb { background: var(--de);    border-color: var(--de); }
  .s-em    .task.done .cb { background: var(--em);    border-color: var(--em); }
  .s-paper .task.done .cb { background: var(--paper); border-color: var(--paper); }
  .s-both  .task.done .cb { background: var(--muted2); border-color: var(--muted2); }

  .cb svg { display: none; }
  .task.done .cb svg { display: block; }

  .task-label {
    font-size: 0.84rem;
    font-weight: 400;
    color: var(--text);
    flex: 1;
    line-height: 1.4;
  }
  .task-sub {
    font-size: 0.73rem;
    color: var(--muted2);
    display: block;
    margin-top: 2px;
  }

  .pill {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .s-de    .pill { color: var(--de);    background: var(--de-bg);    border: 1px solid var(--de-border); }
  .s-em    .pill { color: var(--em);    background: var(--em-bg);    border: 1px solid var(--em-border); }
  .s-paper .pill { color: var(--paper); background: var(--paper-bg); border: 1px solid var(--paper-border); }
  .s-both  .pill { color: var(--muted2); background: var(--both-bg); border: 1px solid var(--both-border); }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 0.75rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .ldot { width: 6px; height: 6px; border-radius: 50%; }

  .hidden { display: none !important; }

  @media (max-width: 500px) {
    .pill { display: none; }
    .countdown-num { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-row">
      <div>
        <div class="module-label">Summer 2026 Exams</div>
        <h1>DEEM<br><em>Digital Electronics &amp; Electrical Machines</em></h1>
      </div>
      <div class="countdown-block">
        <div class="countdown-num" id="days">—</div>
        <div class="countdown-label">days to go</div>
        <div class="countdown-label" style="margin-top:4px;color:var(--exam)">Exam: 3 Jun</div>
      </div>
    </div>

    <div class="prog-wrap">
      <div class="prog-top">
        <span>Progress</span>
        <span id="prog-count">0 / 0 tasks</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="ldot" style="background:var(--de)"></div>Digital Electronics</div>
      <div class="legend-item"><div class="ldot" style="background:var(--em)"></div>Elec Machines</div>
      <div class="legend-item"><div class="ldot" style="background:var(--paper)"></div>Past Papers</div>
      <div class="legend-item"><div class="ldot" style="background:var(--muted2)"></div>General</div>
    </div>
  </header>

  <div class="filter-row">
    <button class="filter-btn active f-all"   onclick="setFilter('all',this)">All</button>
    <button class="filter-btn f-de"            onclick="setFilter('de',this)">Digital Elec</button>
    <button class="filter-btn f-em"            onclick="setFilter('em',this)">Elec Machines</button>
    <button class="filter-btn f-paper"         onclick="setFilter('paper',this)">Past Papers</button>
    <button class="filter-btn f-todo"          onclick="setFilter('todo',this)">To-do only</button>
  </div>

  <div id="sections-container"></div>

</div>

<script>
const STORAGE_KEY = 'deem-checklist-june2026-v1';

const SECTIONS = [
  {
    id: 's-de-review',
    type: 'de',
    label: 'Digital Electronics — Review',
    pill: 'DE',
    tasks: [
      { id:'de1', label:'Review Boolean minimisation', sub:'DE3 slides — K-maps, SOP/POS forms' },
      { id:'de2', label:'Review flip flops', sub:'DE5 SR flip-flops, DE6 D/T/JK — excitation tables, timing diagrams' },
      { id:'de3', label:'Review FSM fundamentals', sub:'DE7 intro + DE8 flip-flop examples' },
      { id:'de4', label:'Review FSM examples', sub:'DE9 binary counter, DE10 stepper motor, DE11 unallocated states' },
      { id:'de5', label:'Review AFSM', sub:'DE15 intro, DE16 code assignment, DE18/19/20 D/T/JK examples' },
      { id:'de6', label:'Review Verilog', sub:'DE14 slides — structural & behavioural models' },
      { id:'de7', label:'Review Programmable Logic Devices', sub:'DE13 slides — PLAs, PALs, FPGAs' },
      { id:'de8', label:'Review Race Hazards', sub:'DE17 slides — static/dynamic hazards, hazard-free covers' },
      { id:'de9', label:'Review Effective Communication topic', sub:'DE4 slides — check nothing examinable is missed' },
    ]
  },
  {
    id: 's-de-practice',
    type: 'de',
    label: 'Digital Electronics — Activities & Practice',
    pill: 'DE',
    tasks: [
      { id:'dep1', label:'Work through FSM Activities', sub:'Activities — FSM Example, FSM Examples 2 & 3 (check solutions)' },
      { id:'dep2', label:'Work through AFSM Activities', sub:'Activities — AFSM Example + Solution' },
      { id:'dep3', label:'Work through Toolbox activity', sub:'Activities — Toolbox' },
      { id:'dep4', label:'Do Week 12 revision questions 2025', sub:'All questions — check against Week 12 revision answers 2025' },
      { id:'dep5', label:'Do All Quizzes', sub:'ALL QUIZZES — full MCQ sweep, flag anything wrong for targeted review' },
    ]
  },
  {
    id: 's-em-review',
    type: 'em',
    label: 'Electrical Machines — Review',
    pill: 'EM',
    tasks: [
      { id:'em1', label:'Review Week 1–5 lecture notes', sub:'2023 notes — core theory foundations' },
      { id:'em2', label:'Review Week 7–10 lecture notes', sub:'2023 notes — advanced topics' },
      { id:'em3', label:'Review Transformers', sub:'DEEM Questions on Transformers + Answers on Transformers' },
      { id:'em4', label:'Review Rectifiers', sub:'DEEM Questions on Rectifiers + DEEM Answers on Rectifiers (1) & base' },
      { id:'em5', label:'Review Switched Rectifiers & Inverters', sub:'DEEM Questions on Switched Rectifiers and Inverters + Answers' },
      { id:'em6', label:'Review Brushed DC Motors', sub:'DEEM Brushed DC Motor Questions + DEEM Brushed DC Motors Answers' },
      { id:'em7', label:'Review Brushless Electric Motors', sub:'DEEM Brushless Electric Motors Questions + Answers' },
      { id:'em8', label:'Review Tutorial 1', sub:'Tutorial 1 + Solutions 1' },
      { id:'em9', label:'Review magnetic materials in motors', sub:'Self study sheet — magnetic materials in motors 2023' },
      { id:'em10', label:'Review time constants', sub:'Self study sheet — time constants (both versions)' },
    ]
  },
  {
    id: 's-papers',
    type: 'paper',
    label: 'Past Papers & Exam Papers',
    pill: 'Paper',
    tasks: [
      { id:'pp1', label:'Past Paper 1', sub:'Timed attempt — then self-mark' },
      { id:'pp2', label:'Past Paper 2', sub:'Timed attempt — then self-mark' },
      { id:'pp3', label:'Past Paper 3', sub:'Timed attempt — then self-mark' },
      { id:'pp4', label:'Past Paper 4', sub:'Timed attempt — then self-mark' },
      { id:'pp5', label:'Past Paper 5', sub:'Timed attempt — then self-mark' },
      { id:'pp6', label:'Past Paper 6', sub:'Timed attempt — then self-mark' },
      { id:'pp7', label:'Exam Paper DEEM 2023', sub:'Attempt then read Generic Exam Feedback 2023' },
      { id:'pp8', label:'Exam Paper DEEM 2024', sub:'Attempt then read Generic Feedback 2024' },
      { id:'pp9', label:'Exam Paper DEEM 2025', sub:'Attempt then read Generic Feedback DEEM 2025' },
    ]
  },
  {
    id: 's-gap',
    type: 'both',
    label: 'Gap-filling & Final Check',
    pill: '—',
    tasks: [
      { id:'gp1', label:'Revisit all flagged weak spots', sub:'Any topic you got wrong or were unsure on during practice' },
      { id:'gp2', label:'Light skim of all notes — no new problems', sub:'Night before the exam only' },
    ]
  }
];

function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }

let state = loadState();
let currentFilter = 'all';

const CHECK_SVG = `<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function sectionClass(type) {
  return type === 'de' ? 's-de' : type === 'em' ? 's-em' : type === 'paper' ? 's-paper' : 's-both';
}

function buildDOM() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  SECTIONS.forEach(sec => {
    const secEl = document.createElement('div');
    secEl.className = `section ${sectionClass(sec.type)}`;
    secEl.dataset.sectype = sec.type;
    secEl.dataset.secid = sec.id;

    const doneCount = sec.tasks.filter(t => state[t.id]).length;
    secEl.innerHTML = `
      <div class="section-head">
        <span class="section-name">${sec.label}</span>
        <span class="section-tally" id="tally-${sec.id}">${doneCount} / ${sec.tasks.length}</span>
      </div>
      <div class="tasks" id="tasks-${sec.id}"></div>
    `;
    container.appendChild(secEl);

    const tasksEl = secEl.querySelector(`#tasks-${sec.id}`);
    sec.tasks.forEach(t => {
      const div = document.createElement('div');
      div.className = 'task' + (state[t.id] ? ' done' : '');
      div.dataset.id = t.id;
      div.innerHTML = `
        <div class="cb">${CHECK_SVG}</div>
        <span class="task-label">${t.label}${t.sub ? `<span class="task-sub">${t.sub}</span>` : ''}</span>
        <span class="pill">${sec.pill}</span>
      `;
      div.addEventListener('click', () => toggle(t.id, sec.id, sec.tasks));
      tasksEl.appendChild(div);
    });
  });
}

function toggle(taskId, secId, secTasks) {
  state[taskId] = !state[taskId];
  saveState(state);
  const el = document.querySelector(`.task[data-id="${taskId}"]`);
  if (el) el.classList.toggle('done', state[taskId]);
  const done = secTasks.filter(t => state[t.id]).length;
  const tally = document.getElementById(`tally-${secId}`);
  if (tally) tally.textContent = `${done} / ${secTasks.length}`;
  updateProgress();
  if (currentFilter === 'todo') applyFilter();
}

function updateProgress() {
  const all = SECTIONS.flatMap(s => s.tasks);
  const done = all.filter(t => state[t.id]).length;
  const pct = all.length ? Math.round(done / all.length * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-count').textContent = `${done} / ${all.length} tasks`;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  document.querySelectorAll('.section').forEach(sec => {
    const type = sec.dataset.sectype;
    let sectionVisible = false;
    sec.querySelectorAll('.task').forEach(task => {
      const tid = task.dataset.id;
      let show = false;
      if      (currentFilter === 'all')   show = true;
      else if (currentFilter === 'de')    show = (type === 'de' || type === 'both');
      else if (currentFilter === 'em')    show = (type === 'em' || type === 'both');
      else if (currentFilter === 'paper') show = (type === 'paper');
      else if (currentFilter === 'todo')  show = !task.classList.contains('done');
      task.classList.toggle('hidden', !show);
      if (show) sectionVisible = true;
    });
    sec.classList.toggle('hidden', !sectionVisible);
  });
}

function updateCountdown() {
  const exam = new Date('2026-06-03T00:00:00');
  const now = new Date();
  const diff = Math.ceil((exam - now) / 86400000);
  document.getElementById('days').textContent = diff > 0 ? diff : (diff === 0 ? 'Today' : 'Done');
}

updateCountdown();
buildDOM();
updateProgress();
</script>
</body>
</html>
